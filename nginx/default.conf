# NAVPRO — Production Nginx Configuration
# Requires: SSL certificate at /etc/nginx/certs/server.crt and server.key

# ── Rate limiting zones ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=export:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Allow health check over HTTP for load balancer probes
  location /health {
    proxy_pass http://backend:4000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
  }

  # Redirect everything else to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS server ────────────────────────────────────────────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name _;
  http2 on;

  # SSL/TLS — replace with real cert from Let's Encrypt or corporate CA
  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers off;
  ssl_session_timeout 1d;
  ssl_session_cache   shared:SSL:10m;
  ssl_stapling        on;
  ssl_stapling_verify on;

  # ── Security ─────────────────────────────────────────────────
  server_tokens off;
  client_max_body_size 2m;
  limit_conn conn_limit 20;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # ── Health check (internal only, no rate limit) ───────────────
  location = /health {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 127.0.0.1;
    deny all;
    proxy_pass http://backend:4000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
  }

  # ── Login endpoint — strict rate limit ───────────────────────
  location = /api/v1/auth/login {
    limit_req zone=login burst=3 nodelay;
    limit_req_status 429;
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Export endpoints — rate limited ──────────────────────────
  location ~* /api/v1/projects/[^/]+/export\. {
    limit_req zone=export burst=5 nodelay;
    limit_req_status 429;
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # ── General API ────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 15s;
  }

  # ── Frontend (Next.js) ─────────────────────────────────────────
  location / {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
