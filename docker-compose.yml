services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: navpro
      POSTGRES_PASSWORD: navpro_dev
      POSTGRES_DB: navpro_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navpro -d navpro_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: navpro
      MINIO_ROOT_PASSWORD: navpro_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Create bucket 'navpro' at startup (idempotent)
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 navpro navpro_minio_dev &&
      mc mb -p local/navpro || true &&
      mc anonymous set download local/navpro || true &&
      echo 'minio-init done'
      "

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://navpro:navpro_dev@postgres:5432/navpro_db
      JWT_SECRET: navpro-dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost,http://localhost:80,http://127.0.0.1
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: navpro
      MINIO_ACCESS_KEY: navpro
      MINIO_SECRET_KEY: navpro_minio_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build: ./backend
    command: ["npm","run","worker"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://navpro:navpro_dev@postgres:5432/navpro_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
